trigger:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "18.x"

  - script: |
      npm install
      npm run build-storybook
    displayName: "Install and Build Storybook"

  - task: AzureStaticWebApp@0
    inputs:
      app_location: "/"
      output_location: "storybook-static"
      azure_static_web_apps_api_token: $(deployment_token)
