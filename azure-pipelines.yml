# Node.js with React
# Build a Node.js project that uses React.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
  displayName: 'npm install'

- script: |
    npm run build-storybook
  displayName: 'Build Storybook'

- task: AzureCLI@2
  inputs:
    azureSubscription: 'Azure for Students'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      # Install Azure Static Web Apps CLI
      npm install -g @azure/static-web-apps-cli

      # Deploy Storybook static site folder to your Static Web App
      swa deploy build/storybook --app-name IsskinUI --resource-group isskinui --env production --subscription c8f1c78c-9a2a-44eb-be62-9dc3db2d7ef2

  displayName: 'Deploy Storybook to Azure Static Web Apps'
